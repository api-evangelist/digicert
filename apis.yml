aid: digicert
url: >-
  https://raw.githubusercontent.com/api-evangelist/digicert/refs/heads/main/apis.yml
apis:
  - aid: digicert:digicert-services-api
    name: DigiCert Services API
    tags:
      - Certificates
      - Encryption
      - PKI
      - SSL
      - TLS
    humanURL: https://dev.digicert.com/en/certcentral-apis/services-api.html
    baseURL: https://www.digicert.com/services/v2
    properties:
      - url: https://dev.digicert.com/en/certcentral-apis/services-api.html
        type: Documentation
    description: >-
      The DigiCert Services API automates certificate processes to save time and
      streamline certificate management across the CertCentral platform. Use this
      API to manage all aspects of your CertCentral account including order, issue,
      reissue, renew, and revoke for SSL/TLS, code signing, client, and document
      signing certificates, as well as user, organization, domain, and product
      management.
  - aid: digicert:digicert-report-library-api
    name: DigiCert Report Library API
    tags:
      - Certificates
      - Encryption
      - Reporting
    humanURL: https://dev.digicert.com/en/certcentral-apis/report-library-api.html
    properties:
      - url: https://dev.digicert.com/en/certcentral-apis/report-library-api.html
        type: Documentation
    description: >-
      The DigiCert Report Library API allows users to create and manage custom
      reports for CertCentral certificate orders, domains, organizations, and
      account activity. Programmatically schedule, retrieve, and export reports
      to streamline visibility and auditing of certificate inventories.
  - aid: digicert:digicert-discovery-api
    name: DigiCert Discovery API
    tags:
      - Certificates
      - Discovery
      - Encryption
      - Scanning
    humanURL: https://dev.digicert.com/en/certcentral-apis/discovery-api.html
    properties:
      - url: https://dev.digicert.com/en/certcentral-apis/discovery-api.html
        type: Documentation
    description: >-
      The DigiCert Discovery API enables scanning of internal and public-facing
      networks using sensors to find SSL/TLS certificates regardless of the
      issuing Certificate Authority. Use the API to manage scan configurations,
      sensors, divisions, and the certificates that have been discovered to
      reduce risk from unknown or expired certificates.
  - aid: digicert:digicert-automation-api
    name: DigiCert Automation API
    tags:
      - Automation
      - Certificates
      - Encryption
    humanURL: https://dev.digicert.com/en/certcentral-apis/automation-api.html
    properties:
      - url: https://dev.digicert.com/en/certcentral-apis/automation-api.html
        type: Documentation
    description: >-
      The DigiCert Automation API allows configuration of automation profiles
      and management of automation activities for certificate lifecycle
      operations. Access all automation features available in CertCentral
      programmatically without needing to log in to the platform.
  - aid: digicert:digicert-custom-reports-api
    name: DigiCert Custom Reports API
    tags:
      - Certificates
      - Encryption
      - GraphQL
      - Reporting
    humanURL: https://dev.digicert.com/en/certcentral-apis/custom-reports-api.html
    properties:
      - url: https://dev.digicert.com/en/certcentral-apis/custom-reports-api.html
        type: Documentation
    description: >-
      The DigiCert Custom Reports API allows generation of customizable and
      comprehensive data sets by leveraging the powerful GraphQL query language.
      Build tailored reporting against CertCentral data sources with flexible
      filtering, sorting, and field selection.
